name: "novasupply"
version: "1.0.0"
config-version: 2

profile: "novasupply"

model-paths: ["models"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Layering: staging is cheap to rebuild (views), marts are queried a lot (tables).
# Schema names are set explicitly per layer via the generate_schema_name macro.
models:
  novasupply:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
